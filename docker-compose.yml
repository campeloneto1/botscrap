version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: botscrap-db
    environment:
      POSTGRES_DB: botscrap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: botscrap-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/botscrap
    volumes:
      - ./backend:/app
    command: >
      bash -c "python migrate.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  scheduler:
    build: ./backend
    container_name: botscrap-scheduler
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/botscrap
    command: python -m app.core.scheduler

  telegram-bot:
    build: ./backend
    container_name: botscrap-telegram-bot
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/botscrap
    volumes:
      - ./backend:/app
    command: python run_telegram_bot.py
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: botscrap-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
